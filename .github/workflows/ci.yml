# mockryx depends on github.com/TAIPANBOX/agent-stack-go via a local
# `replace` in go.mod (that module has no tagged release yet), so every job
# here checks out both repos side by side, mockryx into ./mockryx and
# agent-stack-go into ./agent-stack-go, matching the relative path
# (../agent-stack-go) the replace directive expects, and runs every step
# with working-directory: mockryx. Once agent-stack-go publishes a tagged
# version, the go.mod replace should be removed in favor of a real pinned
# version, and this can go back to a single checkout.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: mockryx
      - uses: actions/checkout@v4
        with:
          repository: TAIPANBOX/agent-stack-go
          path: agent-stack-go
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: true
          cache-dependency-path: mockryx/go.sum
      - name: gofmt
        working-directory: mockryx
        run: test -z "$(gofmt -l .)" || (gofmt -l .; exit 1)
      - name: vet
        working-directory: mockryx
        run: go vet ./...
      - name: staticcheck
        working-directory: mockryx
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...
      - name: test
        working-directory: mockryx
        run: go test -race ./...
      - name: build
        working-directory: mockryx
        run: go build ./...

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: mockryx
      - uses: actions/checkout@v4
        with:
          repository: TAIPANBOX/agent-stack-go
          path: agent-stack-go
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: true
          cache-dependency-path: mockryx/go.sum
      - name: govulncheck
        working-directory: mockryx
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - name: gosec
        working-directory: mockryx
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -quiet ./...
