<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif"><defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#0a0e16"/><stop offset="1" stop-color="#0d1117"/>
  </linearGradient>
  <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#2dd4bf"/><stop offset="0.5" stop-color="#4493f8"/><stop offset="1" stop-color="#2dd4bf"/>
  </linearGradient>
  <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
    <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#161d27" stroke-width="1"/>
  </pattern>
  <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.45"/>
  </filter>
  <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
    <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#2dd4bf" flood-opacity="0.5"/>
  </filter>
</defs><rect x="0" y="0" width="1280" height="720" rx="0" ry="0" fill="url(#bg)"/>
<rect x="0" y="0" width="1280" height="720" fill="url(#grid)" opacity="0.5"/>
<rect x="0" y="0" width="1280" height="4" fill="url(#accent)"/>
<text x="1252" y="698" font-size="12.5" fill="#69788b" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="end">github.com/TAIPANBOX/mockryx</text>
<text x="40" y="56" font-size="28" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">CI gating model</text>
<text x="40" y="84" font-size="15" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">run and report use distinct exit codes so a CI gate can tell a real guardrail gap from a misconfigured harness.</text>
<line x1="40" y1="100" x2="1240" y2="100" stroke="#222b38" stroke-width="1"/>
<rect x="40" y="180" width="360" height="190" rx="14" ry="14" fill="#141a23" stroke="#283341" stroke-width="1" filter="url(#soft)"/>
<text x="62" y="214" font-size="12" fill="#2dd4bf" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="start" letter-spacing="1.5">1 · RUN</text>
<rect x="62" y="230" width="316" height="44" rx="8" ry="8" fill="#0b0f16" stroke="#222b38" stroke-width="1"/>
<text x="74" y="258" font-size="10.8" fill="#2dd4bf" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="start">$ mockryx run --gateway &lt;url&gt; ./scenarios</text>
<text x="62" y="306" font-size="13.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">Rehearses every scenario in the</text>
<text x="62" y="326" font-size="13.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">directory, up to `repeat` times each,</text>
<text x="62" y="346" font-size="13.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">and asserts its `expect` block.</text>
<line x1="414" y1="275" x2="457" y2="275" stroke="#69788b" stroke-width="2"/>
<path d="M 464 275 l -9 -5 l 0 10 z" fill="#69788b"/>
<rect x="464" y="180" width="300" height="190" rx="14" ry="14" fill="#141a23" stroke="#283341" stroke-width="1" filter="url(#soft)"/>
<text x="486" y="214" font-size="12" fill="#4493f8" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="start" letter-spacing="1.5">2 · EXIT CODE</text>
<rect x="486" y="230" width="256" height="44" rx="8" ry="8" fill="#0b0f16" stroke="#222b38" stroke-width="1"/>
<text x="498" y="258" font-size="12.5" fill="#4493f8" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="start">$ echo $?</text>
<text x="486" y="306" font-size="13" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">The process exit code is the one</text>
<text x="486" y="326" font-size="13" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">signal a CI step needs to gate on:</text>
<text x="486" y="346" font-size="13" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">a real gap vs. a broken harness.</text>
<rect x="800" y="150" width="440" height="150" rx="12" ry="12" fill="#1b2331" stroke="#3fb950" stroke-width="1.4" filter="url(#soft)"/>
<rect x="800" y="150" width="6" height="150" rx="3" ry="3" fill="#3fb950" stroke="#283341" stroke-width="1"/>
<circle cx="840" cy="192" r="20" fill="#1a212c" stroke="#3fb950" stroke-width="2"/>
<text x="840" y="199" font-size="20" fill="#3fb950" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="middle">0</text>
<text x="876" y="186" font-size="16.5" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">CI passes</text>
<text x="824" y="228" font-size="12" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">Every rehearsed guardrail held: no Finding was recorded.</text>
<text x="824" y="284" font-size="11.5" fill="#69788b" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="start">merge allowed</text>
<path d="M 764 275 C 779.0 275, 779.0 225, 788 225" fill="none" stroke="#3fb950" stroke-width="1.8" opacity="0.6"/><path d="M 794 225 l -9 -5 l 0 10 z" fill="#3fb950" opacity="0.6"/>
<rect x="800" y="330" width="440" height="150" rx="12" ry="12" fill="#1b2331" stroke="#ff6b63" stroke-width="1.4" filter="url(#soft)"/>
<rect x="800" y="330" width="6" height="150" rx="3" ry="3" fill="#ff6b63" stroke="#283341" stroke-width="1"/>
<circle cx="840" cy="372" r="20" fill="#1a212c" stroke="#ff6b63" stroke-width="2"/>
<text x="840" y="379" font-size="20" fill="#ff6b63" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="middle">1</text>
<text x="876" y="366" font-size="16.5" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">CI fails: guardrail gap</text>
<text x="824" y="408" font-size="12" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">One or more Findings: a real defensive gap. This is what a</text>
<text x="824" y="428" font-size="12" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">CI gate should fail the build on.</text>
<text x="824" y="464" font-size="11.5" fill="#69788b" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="start">block merge, fix the gap</text>
<path d="M 764 275 C 779.0 275, 779.0 405, 788 405" fill="none" stroke="#ff6b63" stroke-width="1.8" opacity="0.6"/><path d="M 794 405 l -9 -5 l 0 10 z" fill="#ff6b63" opacity="0.6"/>
<rect x="800" y="510" width="440" height="150" rx="12" ry="12" fill="#1b2331" stroke="#e3b341" stroke-width="1.4" filter="url(#soft)"/>
<rect x="800" y="510" width="6" height="150" rx="3" ry="3" fill="#e3b341" stroke="#283341" stroke-width="1"/>
<circle cx="840" cy="552" r="20" fill="#1a212c" stroke="#e3b341" stroke-width="2"/>
<text x="840" y="559" font-size="20" fill="#e3b341" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="middle">2</text>
<text x="876" y="546" font-size="16.5" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">CI fails: broken harness</text>
<text x="824" y="588" font-size="12" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">Usage, config, or load error (bad flag, no gateway,</text>
<text x="824" y="608" font-size="12" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">unreadable scenarios): nothing was actually rehearsed.</text>
<text x="824" y="644" font-size="11.5" fill="#69788b" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="start">block merge, fix the pipeline</text>
<path d="M 764 275 C 779.0 275, 779.0 585, 788 585" fill="none" stroke="#e3b341" stroke-width="1.8" opacity="0.6"/><path d="M 794 585 l -9 -5 l 0 10 z" fill="#e3b341" opacity="0.6"/>
<line x1="40" y1="600" x2="1240" y2="600" stroke="#222b38" stroke-width="1"/>
<text x="40" y="626" font-size="13" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="600" text-anchor="start">Convention: fail the CI step only on exit 1 (a real guardrail gap).</text>
<text x="40" y="648" font-size="13" fill="#2dd4bf" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">Treat exit 2 as a broken pipeline to fix, not a security finding to triage.</text></svg>