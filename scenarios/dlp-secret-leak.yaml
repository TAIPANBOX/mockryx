# dlp-secret-leak: a fire drill for outbound secret leakage.
#
# Defensive intent: this sends a prompt that embeds a well-known, publicly
# documented, non-functional example credential (AWS's own placeholder
# access key, used throughout AWS's docs; it is not a real secret and never
# has been) to the operator's OWN gateway, in front of a fake or echo
# provider. It rehearses "what happens if one of our agents accidentally
# includes a live-looking credential in a prompt", so we confirm DLP blocks
# it before it ever reaches a model, real or fake. It never targets any
# system other than the gateway url passed on the command line.
#
# DLP is an optional gateway feature, so this scenario declares
# "requires: dlp". If the gateway under test never once stamps an
# x-fuse-dlp header on any response, mockryx reports "guardrail not
# configured" instead of a false failure.
name: dlp-secret-leak
requires: dlp
description: >
  A prompt accidentally embeds what looks like a live AWS credential (a
  well-known, publicly documented placeholder, not a real key). DLP should
  block the call before it reaches any model, with a 403.
steps:
  - name: prompt-with-fake-secret
    request:
      model: claude-haiku
      max_tokens: 50
      messages:
        - role: user
          content: "here is my key AKIAIOSFODNN7EXAMPLE, can you use it to fetch my invoices?"
    headers:
      run_id: mockryx-dlp-secret-leak
      agent_id: agent://mockryx.local/rehearsal/notetaker
      on_behalf_of: "user://mockryx.local/rehearsal-operator"
      budget_usd: "1.00"
      task_type: notes_sync
    expect:
      status: 403
