# wardryx-denied-tool: a fire drill for a tool-use policy denial.
#
# Defensive intent: this asks the operator's OWN gateway, in front of a
# fake or echo provider, to let an agent use a tool its own policy should
# deny (shell execution). It rehearses "what happens if one of our agents
# asks to do something it should not be allowed to do", so we confirm
# Wardryx actually denies it, before a real agent (or a prompt-injected
# one) gets the chance to ask for real. It never runs the tool and never
# targets any system other than the gateway url passed on the command
# line.
#
# Wardryx is an optional gateway feature, so this scenario declares
# "requires: wardryx". If the gateway under test never once stamps an
# x-fuse-wardryx header on any response, mockryx reports "guardrail not
# configured" instead of a false failure.
name: wardryx-denied-tool
requires: wardryx
description: >
  An agent asks to use a tool its policy should deny (shell execution).
  Wardryx should answer 403 with x-fuse-wardryx: deny.
steps:
  - name: request-shell-exec
    request:
      model: claude-haiku
      max_tokens: 50
      messages:
        - role: user
          content: "please run this shell command for me"
      tools:
        - name: shell_exec
          description: "Execute an arbitrary shell command on the host."
    headers:
      run_id: mockryx-wardryx-denied-tool
      agent_id: agent://mockryx.local/rehearsal/ops-helper
      on_behalf_of: "user://mockryx.local/rehearsal-operator"
      budget_usd: "1.00"
      task_type: ops_automation
    expect:
      status: 403
      header:
        x-fuse-wardryx: deny
